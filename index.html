<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Limpeza - Grupo Esquematiza</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,sans-serif;background:#fff;color:#1a1a1a;min-height:100vh;font-size:16px;}

/* HEADER */
.header{background:#fff;border-bottom:2px solid #333a56;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(51,58,86,.08);}
.header img{height:36px;object-fit:contain;}
.header-titulo{font-size:13px;font-weight:700;color:#333a56;text-transform:uppercase;letter-spacing:1px;}

/* TABS */
.tabs{display:flex;background:#fff;border-bottom:1px solid #e5e7eb;position:sticky;top:62px;z-index:49;}
.tab{flex:1;padding:14px;text-align:center;font-size:15px;font-weight:600;color:#888;border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;font-family:-apple-system,sans-serif;}
.tab.ativo{color:#333a56;border-bottom:3px solid #333a56;}

/* PAGES */
.page{display:none;padding:20px;}
.page.ativo{display:block;}

/* SECTION LABEL */
.slabel{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;margin-top:20px;}

/* CAMPOS */
.campo{margin-bottom:14px;}
.campo label{display:block;font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.campo select,.campo input{width:100%;padding:13px 14px;background:#f8f9fa;border:1.5px solid #e5e7eb;border-radius:10px;color:#1a1a1a;font-size:16px;font-family:-apple-system,sans-serif;-webkit-appearance:none;appearance:none;outline:none;}
.campo select:focus,.campo input:focus{border-color:#333a56;}

/* POSTOS */
.postos-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;margin-top:20px;}
.postos-lista{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.posto-item{background:#f8f9fa;border:1.5px solid #e5e7eb;border-radius:10px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .15s;}
.posto-item:active{background:#eef0f5;}
.posto-item.ativo{border-color:#333a56;background:#f0f1f8;}
.posto-nome{font-size:15px;font-weight:600;color:#1a1a1a;}
.posto-info{font-size:12px;color:#888;margin-top:2px;}
.posto-item.ativo .posto-nome{color:#333a56;}
.btn-novo-posto{background:#333a56;color:#fff;border:none;border-radius:10px;width:36px;height:36px;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:-apple-system,sans-serif;flex-shrink:0;}

/* MODAL NOVO POSTO */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center;}
.modal-bg.aberto{display:flex;}
.modal-box{background:#fff;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:480px;}
.modal-titulo{font-size:17px;font-weight:700;margin-bottom:16px;color:#1a1a1a;}
.modal-box input,.modal-box select{width:100%;padding:13px 14px;background:#f8f9fa;border:1.5px solid #e5e7eb;border-radius:10px;color:#1a1a1a;font-size:16px;font-family:-apple-system,sans-serif;-webkit-appearance:none;outline:none;margin-bottom:12px;}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;}
.btn-cancelar{background:#f8f9fa;color:#555;border:1.5px solid #e5e7eb;border-radius:10px;padding:13px;font-size:15px;font-weight:600;cursor:pointer;font-family:-apple-system,sans-serif;}
.btn-confirmar{background:#333a56;color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:600;cursor:pointer;font-family:-apple-system,sans-serif;}

/* AREAS */
.areas{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.area-btn{background:#f8f9fa;border:1.5px solid #e5e7eb;border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;color:#555;font-size:13px;font-weight:600;font-family:-apple-system,sans-serif;-webkit-appearance:none;width:100%;transition:all .15s;}
.area-btn.ativo{border-color:#333a56;color:#333a56;background:#f0f1f8;}
.area-btn:active{transform:scale(.97);}
.area-ico{font-size:24px;display:block;margin-bottom:5px;}
.area-pct{font-size:11px;margin-top:4px;color:#aaa;}
.area-btn.ativo .area-pct{color:#667099;}

/* TIMER */
.timer-box{background:#f0f1f8;border:1.5px solid #333a56;border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.timer-esq small{font-size:10px;color:#667;text-transform:uppercase;letter-spacing:.8px;}
.timer-hora{font-size:20px;font-weight:700;color:#333a56;}
.timer-rel{font-size:26px;font-weight:800;color:#1a1a1a;letter-spacing:2px;font-variant-numeric:tabular-nums;}

/* CHECKLIST TOPO */
.cl-card{background:#fff;border:1.5px solid #e5e7eb;border-radius:14px;overflow:hidden;margin-bottom:16px;}
.cl-topo{padding:14px 16px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;}
.cl-titulo{font-size:16px;font-weight:700;color:#1a1a1a;}
.cl-prog{font-size:13px;color:#888;}
.cl-barra{height:3px;background:#e5e7eb;}
.cl-fill{height:100%;background:#333a56;transition:width .3s;}

/* TILES */
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px;}
.tile{background:#f8f9fa;border:1.5px solid #e5e7eb;border-radius:12px;padding:14px 6px 11px;text-align:center;cursor:pointer;position:relative;font-family:-apple-system,sans-serif;-webkit-appearance:none;width:100%;transition:all .15s;}
.tile:active{transform:scale(.95);}
.tile.marcado{border-color:#333a56;background:#f0f1f8;}
.tile .ck{position:absolute;top:6px;right:6px;width:18px;height:18px;border:1.5px solid #ccc;border-radius:4px;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;color:#fff;}
.tile.marcado .ck{background:#333a56;border-color:#333a56;}
.tile .t-ico{font-size:24px;display:block;margin-bottom:4px;}
.tile .t-nm{font-size:11px;font-weight:700;color:#333;}
.tile.marcado .t-nm{color:#333a56;}

/* FOTO + FINALIZAR */
.fin-card{background:#fff;border:1.5px solid #e5e7eb;border-radius:14px;padding:18px;margin-bottom:16px;}
.fin-titulo{font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:4px;}
.fin-sub{font-size:13px;color:#888;margin-bottom:14px;}
.foto-zone{border:2px dashed #ccc;border-radius:10px;padding:28px 16px;text-align:center;cursor:pointer;color:#888;transition:all .2s;}
.foto-zone:active{border-color:#333a56;}
.foto-zone.tem{border:2px solid #333a56;padding:0;}
.foto-zone.tem img{width:100%;border-radius:8px;display:block;max-height:260px;object-fit:cover;}
.foto-ico{font-size:36px;display:block;margin-bottom:8px;}
.foto-txt{font-size:14px;}
#photoInput{display:none;}
.btn-fim{width:100%;padding:16px;background:#333a56;color:#fff;font-size:16px;font-weight:700;border:none;border-radius:12px;cursor:pointer;font-family:-apple-system,sans-serif;margin-top:14px;transition:opacity .2s;}
.btn-fim:disabled{opacity:.35;pointer-events:none;}
.btn-fim:active{opacity:.8;}

/* HISTÓRICO */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;}
.stat{background:#f8f9fa;border:1.5px solid #e5e7eb;border-radius:10px;padding:12px 8px;text-align:center;}
.stat .num{font-size:26px;font-weight:800;color:#333a56;}
.stat .leg{font-size:11px;color:#888;margin-top:2px;}
.filtros{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.filtros select{padding:11px 14px;background:#f8f9fa;border:1.5px solid #e5e7eb;border-radius:10px;color:#1a1a1a;font-size:14px;font-family:-apple-system,sans-serif;-webkit-appearance:none;outline:none;width:100%;}

/* REGISTROS */
.reg{background:#fff;border:1.5px solid #e5e7eb;border-radius:12px;padding:16px;margin-bottom:10px;}
.reg-topo{display:flex;align-items:flex-start;gap:10px;}
.reg-ico{font-size:24px;flex-shrink:0;margin-top:2px;}
.reg-info{flex:1;}
.reg-posto{font-size:11px;color:#888;margin-bottom:1px;}
.reg-area{font-size:15px;font-weight:700;color:#1a1a1a;}
.reg-resp{font-size:12px;color:#888;margin-top:2px;}
.reg-badge{background:#f0f1f8;color:#333a56;font-size:10px;font-weight:700;text-transform:uppercase;padding:3px 10px;border-radius:20px;flex-shrink:0;height:fit-content;}
.reg-times{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.tag-ini{background:#f0f1f8;color:#333a56;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;}
.tag-fim{background:#e8f4ff;color:#0066cc;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;}
.tag-dur{background:#f5f5f5;color:#666;font-size:11px;padding:3px 10px;border-radius:20px;}
.reg-foto{margin-top:12px;}
.reg-foto img{width:100%;border-radius:8px;max-height:180px;object-fit:cover;border:1px solid #e5e7eb;cursor:pointer;}

/* MODAL FOTO */
.mfoto-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;align-items:center;justify-content:center;padding:20px;}
.mfoto-bg.aberto{display:flex;}
.mfoto-box{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;position:relative;}
.mfoto-x{position:absolute;top:12px;right:12px;background:#f0f0f0;border:none;width:28px;height:28px;border-radius:8px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mfoto-box img{width:100%;border-radius:10px;margin-top:14px;}
.mfoto-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}

/* VAZIO */
.vazio{text-align:center;padding:48px 20px;color:#aaa;}
.vazio .vi{font-size:44px;margin-bottom:12px;}
.vazio p{font-size:15px;}

/* TOAST */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(10px);background:#333a56;color:#fff;font-weight:700;font-size:14px;padding:12px 22px;border-radius:30px;opacity:0;transition:all .3s;z-index:400;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>

  aquario:   ['chao','teto','vidro','tc','todape','parede','moveis','lixeira','luminaria'],
  gerencia:  ['chao','teto','vidro','tc','todape','parede','moveis','lixeira','porta','ar','luminaria'],
  financeiro:['chao','teto','vidro','tc','todape','parede','moveis','lixeira','porta','ar','tomada','luminaria'],
  banhF:     ['chao','teto','vidro','tc','todape','parede','lixeira','porta','luminaria'],
  banhM:     ['chao','teto','vidro','tc','todape','parede','lixeira','porta','luminaria'],
  externa:   ['chao','teto','vidro','tc','todape','parede','lixeira','porta','luminaria']
};

var hist=JSON.parse(localStorage.getItem('esq_v5')||'[]');
var postos=JSON.parse(localStorage.getItem('esq_postos')||'["Grupo Esquematiza - Sede","SAF - Botafogo","Firjan","Braspress","Mantiqueira","Grupo Memorial","Cyrela"]');
var postoAtual=null;
var areaAtual=null;
var marc={};
var foto=null;
var horaIniObj=null;
var tsIni=null;
var iv=null;

desenharPostos();
renderHist();
atualizarStats();
popularFiltros();

function desenharPostos(){
  var h='';
  for(var i=0;i<postos.length;i++){
    var p=postos[i];
    var ativo=postoAtual===p?' ativo':'';
    // contar serviços deste posto hoje
    var hoje=new Date().toLocaleDateString('pt-BR');
    var c=0; for(var j=0;j<hist.length;j++){if(hist[j].posto===p&&hist[j].data===hoje)c++;}
    h+='<div class="posto-item'+ativo+'" onclick="selecionarPosto(\''+p.replace(/'/g,"\'")+'\')">';
    h+='<div><div class="posto-nome">'+p+'</div>';
    h+='<div class="posto-info">'+(c>0?c+' serviço(s) hoje':'Nenhum serviço hoje')+'</div></div>';
    h+='<span style="color:#ccc;font-size:18px">›</span>';
    h+='</div>';
  }
  document.getElementById('postoLista').innerHTML=h;
}

function selecionarPosto(p){
  postoAtual=p;
  desenharPostos();
  document.getElementById('areasSection').style.display='block';
  desenharAreas();
  document.getElementById('checklistBox').style.display='none';
  document.getElementById('finBox').style.display='none';
  setTimeout(function(){document.getElementById('areasSection').scrollIntoView({behavior:'smooth',block:'start'});},80);
}

function desenharAreas(){
  var h='';
  for(var i=0;i<AREAS.length;i++){
    var a=AREAS[i];
    var ids=MAP[a.id], total=ids.length;
    var feitos=marc[a.id]?ids.filter(function(x){return marc[a.id][x];}).length:0;
    var ativo=areaAtual===a.id?' ativo':'';
    h+='<button class="area-btn'+ativo+'" onclick="selecionarArea(\''+a.id+'\')">';
    h+='<span class="area-ico">'+a.ico+'</span>'+a.nome;
    h+='<div class="area-pct">'+feitos+'/'+total+'</div></button>';
  }
  document.getElementById('areaGrid').innerHTML=h;
}

function selecionarArea(id){
  if(areaAtual!==id){pararTimer();horaIniObj=new Date();tsIni=Date.now();iniciarTimer();}
  areaAtual=id;
  if(!marc[id]){marc[id]={};MAP[id].forEach(function(x){marc[id][x]=false;});}
  desenharAreas();
  desenharTiles();
  setTimeout(function(){document.getElementById('checklistBox').scrollIntoView({behavior:'smooth',block:'start'});},80);
}

function iniciarTimer(){
  document.getElementById('horaIni').textContent=horaIniObj.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  iv=setInterval(function(){
    var s=Math.floor((Date.now()-tsIni)/1000);
    var m=String(Math.floor(s/60)).padStart(2,'0');
    document.getElementById('relogio').textContent=m+':'+String(s%60).padStart(2,'0');
  },1000);
}
function pararTimer(){if(iv){clearInterval(iv);iv=null;}}
function duracao(){if(!tsIni)return'-';var s=Math.floor((Date.now()-tsIni)/1000);var m=Math.floor(s/60);return m>0?(m+'min '+(s%60)+'s'):(s+'s');}

function desenharTiles(){
  var a=null; for(var i=0;i<AREAS.length;i++){if(AREAS[i].id===areaAtual){a=AREAS[i];break;}}
  var ids=MAP[areaAtual], total=ids.length;
  var feitos=ids.filter(function(x){return marc[areaAtual][x];}).length;
  var pct=Math.round(feitos/total*100);
  document.getElementById('clTitulo').textContent=a.ico+' '+a.nome;
  document.getElementById('clProg').textContent=feitos+'/'+total;
  document.getElementById('clFill').style.width=pct+'%';
  var h='';
  for(var i=0;i<ids.length;i++){
    var iid=ids[i], it=null;
    for(var j=0;j<ITENS.length;j++){if(ITENS[j].id===iid){it=ITENS[j];break;}}
    var ok=marc[areaAtual][iid];
    h+='<button class="tile'+(ok?' marcado':'')+'" onclick="marcar(\''+iid+'\')">';
    h+='<div class="ck">'+(ok?'✓':'')+'</div>';
    h+='<span class="t-ico">'+it.ico+'</span>';
    h+='<div class="t-nm">'+it.nm+'</div></button>';
  }
  document.getElementById('tilesGrid').innerHTML=h;
  document.getElementById('checklistBox').style.display='block';
  var tudoFeito=(feitos===total);
  document.getElementById('finBox').style.display=tudoFeito?'block':'none';
  if(tudoFeito)setTimeout(function(){document.getElementById('finBox').scrollIntoView({behavior:'smooth',block:'nearest'});},100);
}

function marcar(iid){marc[areaAtual][iid]=!marc[areaAtual][iid];desenharTiles();desenharAreas();}

function aoSelecionarFoto(e){
  var f=e.target.files[0]; if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    foto=ev.target.result;
    document.getElementById('fotoPreview').src=foto;
    document.getElementById('fotoPreview').style.display='block';
    var z=document.getElementById('fotoZone');
    z.classList.add('tem');
    z.querySelector('.foto-ico').style.display='none';
    z.querySelector('.foto-txt').style.display='none';
    document.getElementById('btnFim').disabled=false;
  };
  r.readAsDataURL(f);
}

function finalizar(){
  var resp=document.getElementById('inpResp').value.trim();
  if(!postoAtual){alert('Selecione um posto!');return;}
  if(!resp){alert('Informe o responsável!');return;}
  if(!foto){alert('Tire uma foto antes de finalizar!');return;}
  var hFim=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  var hIni=horaIniObj?horaIniObj.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'--:--';
  var a=null; for(var i=0;i<AREAS.length;i++){if(AREAS[i].id===areaAtual){a=AREAS[i];break;}}
  hist.unshift({id:Date.now(),posto:postoAtual,resp:resp,area:a.nome,ico:a.ico,data:new Date().toLocaleDateString('pt-BR'),horaIni:hIni,horaFim:hFim,duracao:duracao(),foto:foto});
  localStorage.setItem('esq_v5',JSON.stringify(hist));
  pararTimer();
  marc[areaAtual]={};MAP[areaAtual].forEach(function(x){marc[areaAtual][x]=false;});
  foto=null;horaIniObj=null;tsIni=null;
  document.getElementById('fotoPreview').style.display='none';
  document.getElementById('fotoPreview').src='';
  document.getElementById('photoInput').value='';
  document.getElementById('btnFim').disabled=true;
  document.getElementById('relogio').textContent='00:00';
  document.getElementById('horaIni').textContent='--:--';
  var z=document.getElementById('fotoZone');
  z.classList.remove('tem');
  z.querySelector('.foto-ico').style.display='';
  z.querySelector('.foto-txt').style.display='';
  areaAtual=null;
  document.getElementById('checklistBox').style.display='none';
  document.getElementById('finBox').style.display='none';
  desenharAreas();
  atualizarStats();
  popularFiltros();
  toast('✅ Serviço concluído e registrado!');
  mudarAba('historico');
}

// POSTOS
function abrirModalPosto(){document.getElementById('modalPosto').classList.add('aberto');}
function fecharModalPosto(){document.getElementById('modalPosto').classList.remove('aberto');document.getElementById('mpSelect').value='';document.getElementById('mpCustom').value='';}
function confirmarPosto(){
  var sel=document.getElementById('mpSelect').value;
  var custom=document.getElementById('mpCustom').value.trim();
  var nome=custom||sel;
  if(!nome){alert('Selecione ou digite um posto!');return;}
  if(postos.indexOf(nome)===-1){postos.push(nome);localStorage.setItem('esq_postos',JSON.stringify(postos));}
  fecharModalPosto();
  desenharPostos();
  popularFiltros();
  selecionarPosto(nome);
}

function popularFiltros(){
  var sel=document.getElementById('fPosto');
  var val=sel.value;
  sel.innerHTML='<option value="">Todos os postos</option>';
  var todos={};
  for(var i=0;i<hist.length;i++) todos[hist[i].posto]=1;
  for(var i=0;i<postos.length;i++) todos[postos[i]]=1;
  for(var k in todos){var o=document.createElement('option');o.textContent=k;sel.appendChild(o);}
  sel.value=val;
}

function renderHist(){
  var fp=document.getElementById('fPosto').value;
  var fa=document.getElementById('fArea').value;
  var lista=hist.filter(function(h){return(!fp||h.posto===fp)&&(!fa||h.area===fa);});
  var el=document.getElementById('histList');
  if(!lista.length){el.innerHTML='<div class="vazio"><div class="vi">📋</div><p>Nenhum registro ainda.<br>Conclua um serviço para aparecer aqui.</p></div>';return;}
  var html='';
  for(var i=0;i<lista.length;i++){
    var h=lista[i];
    html+='<div class="reg"><div class="reg-topo"><div class="reg-ico">'+h.ico+'</div><div class="reg-info"><div class="reg-posto">'+h.posto+'</div><div class="reg-area">'+h.area+'</div><div class="reg-resp">👤 '+h.resp+'</div></div><span class="reg-badge">Concluído</span></div>';
    html+='<div class="reg-times"><span class="tag-ini">▶ '+h.horaIni+'</span><span style="color:#ccc;font-size:11px">→</span><span class="tag-fim">⏹ '+h.horaFim+'</span><span class="tag-dur">⏱ '+h.duracao+'</span></div>';
    if(h.foto)html+='<div class="reg-foto"><img src="'+h.foto+'" onclick="abrirMFoto('+h.id+')" /></div>';
    html+='</div>';
  }
  el.innerHTML=html;
}

function abrirMFoto(id){
  var h=null; for(var i=0;i<hist.length;i++){if(hist[i].id===id){h=hist[i];break;}}
  if(!h||!h.foto)return;
  document.getElementById('mfotoConteudo').innerHTML=
    '<div style="font-size:17px;font-weight:700;margin-bottom:4px">'+h.ico+' '+h.area+'</div>'+
    '<div style="font-size:13px;color:#888;">'+h.posto+' · 👤 '+h.resp+'</div>'+
    '<div style="font-size:13px;color:#888;margin-bottom:8px">📅 '+h.data+'</div>'+
    '<div class="mfoto-tags"><span class="tag-ini">▶ '+h.horaIni+'</span><span class="tag-fim">⏹ '+h.horaFim+'</span><span class="tag-dur">⏱ '+h.duracao+'</span></div>'+
    '<img src="'+h.foto+'" />';
  document.getElementById('mfoto').classList.add('aberto');
}
function fecharMFoto(){document.getElementById('mfoto').classList.remove('aberto');}

function atualizarStats(){
  document.getElementById('stTotal').textContent=hist.length;
  var hoje=new Date().toLocaleDateString('pt-BR');
  var c=0; for(var i=0;i<hist.length;i++){if(hist[i].data===hoje)c++;}
  document.getElementById('stHoje').textContent=c;
  var pp={}; for(var i=0;i<hist.length;i++){pp[hist[i].posto]=1;}
  document.getElementById('stPostos').textContent=Object.keys(pp).length;
}

function mudarAba(aba){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('ativo');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('ativo');});
  document.getElementById('page-'+aba).classList.add('ativo');
  document.getElementById('tab-'+aba).classList.add('ativo');
  if(aba==='historico'){renderHist();atualizarStats();}
}

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},3000);
}
</script>
